version: '3.8'
services:
  # Ứng dụng Spring Boot
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/logistics_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=thuctd2k5@ZZ
      - SPRING_REDIS_HOST=redis-cache
      - SPRING_REDIS_PORT=6379
    depends_on:
      - mysql-db
      - redis-cache

  # Database MySQL
  mysql-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=thuctd2k5@ZZ
      - MYSQL_DATABASE=logistics_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Cache Redis
  redis-cache:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
